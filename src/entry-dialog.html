<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punch98 note</title>
    <link rel="stylesheet" href="../node_modules/98.css/dist/98.css" />
    <link rel="stylesheet" href="./entry-dialog.css" />
  </head>
  <body>
    <main class="entry-shell">
      <section class="window entry-window" aria-label="Punch98 note dialog">
        <div class="title-bar">
          <div class="title-bar-text" id="entry-dialog-title">Punch98 note</div>
          <div class="title-bar-controls">
            <button type="button" aria-label="Close" id="entry-close-button"></button>
          </div>
        </div>

        <div class="window-body entry-body">
          <form class="entry-layout" id="entry-form">
            <p class="entry-duration" id="entry-duration">00:00:00</p>
            <textarea
              id="entry-text"
              class="entry-textarea"
              aria-label="Entry note"
              spellcheck="false"
            ></textarea>
            <div class="entry-actions">
              <button type="submit" id="entry-ok-button">OK</button>
              <button type="button" id="entry-cancel-button">Cancel</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="./entry-dialog.js"></script>
  </body>
</html>
